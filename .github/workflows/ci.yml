name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install ruff
        run: uv pip install --system ruff

      - name: Check style
        working-directory: backend
        run: ruff check .

      - name: Check formatting
        working-directory: backend
        run: ruff format --check .

  # ── test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest + security suite)
    runs-on: ubuntu-latest
    env:
      # Satisfies the SECRET_KEY strength check without exposing a real secret.
      SECRET_KEY: "ci-placeholder-key-abcdef1234567890abcdef1234567890abcdef123456"
      ENVIRONMENT: development
      # Dummy values — tests use SQLite in-memory, not a real DB or API.
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      FINNHUB_API_KEY: dummy

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        working-directory: backend
        run: uv pip install --system ".[dev]"

      - name: Run tests
        working-directory: backend
        run: pytest --tb=short -q

  # ── docker-build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]   # only build if lint + tests pass
    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build
