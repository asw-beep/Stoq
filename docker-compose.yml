# Local development stack.
# Phase 1: database only is required to build/migrate. The backend service is
# included so `docker compose up` runs the full API once the image builds.
# frontend / prometheus / grafana are added in their respective phases.

services:
  db:
    image: postgres:18
    container_name: stock_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No host port mapping: Postgres is reachable only on the internal Compose
    # network (the backend connects via host `db`). Not exposed to the host (W-8 /
    # HIGH-006). For ad-hoc local access use `docker compose exec db psql ...`.
    expose:
      - "5432"
    volumes:
      # postgres:18+ stores data in a versioned subdir; mount the parent, not /data.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: stock_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER}
      SEED_SYMBOLS: ${SEED_SYMBOLS}
      HISTORY_YEARS: ${HISTORY_YEARS}
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8000:8000"

volumes:
  pgdata:
